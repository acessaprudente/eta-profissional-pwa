<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ETA Profissional - PWA</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
  <header><h1>ETA Profissional - PWA</h1></header>
  <nav class="menu">
    <button onclick="abrir('balanco')">⚖ Balanço de Massa</button>
    <button onclick="abrir('pac')">🧪 PAC Férrico</button>
    <button onclick="abrir('cal')">🧂 Cal Hidratada</button>
    <button onclick="abrir('polimero')">🧬 Polímero</button>
    <button onclick="abrir('sedimentacao')">💧 Sedimentação</button>
    <button onclick="abrir('jar')">🧫 Jar Test</button>
    <button onclick="exportarPDF()">📄 Exportar PDF</button>
    <button onclick="exportarExcel()">📊 Exportar Excel</button>
  </nav>
  <main id="conteudo" class="conteudo"></main>

  <script src="js/util.js"></script>
  <script src="js/balanco.js"></script>
  <script src="js/pac.js"></script>
  <script src="js/cal.js"></script>
  <script src="js/polimero.js"></script>
  <script src="js/sedimentacao.js"></script>
  <script src="js/jar.js"></script>
  <script src="js/export.js"></script>
  <script src="js/storage.js"></script>

  <script>
    function abrir(modulo) {
      const fn = window[modulo + 'View'];
      if (typeof fn === 'function') {
        document.getElementById('conteudo').innerHTML = fn();
      } else {
        document.getElementById('conteudo').innerHTML = '<p>Módulo não encontrado: ' + modulo + '</p>';
      }
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').then(()=>console.log('Service Worker registrado'));
    }
    abrir('jar');
  </script>
</body>
</html>
