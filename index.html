<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ETA Profissional - PWA</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="css/style.css">

  <!-- Bibliotecas para exportação -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
  <h1>ETA Profissional - PWA</h1>

  <!-- Menu principal (equivalente ao Dashboard) -->
  <nav>
    <button onclick="abrir('balanco')">⚖ Balanço de Massa</button>
    <button onclick="abrir('pac')">🧪 PAC Férrico</button>
    <button onclick="abrir('cal')">🧂 Cal Hidratada</button>
    <button onclick="abrir('polimero')">🧬 Polímero</button>
    <button onclick="abrir('sedimentacao')">💧 Sedimentação</button>
    <button onclick="abrir('jar')">🧫 Jar Test</button>
    <button onclick="exportarPDF()">📄 Exportar PDF</button>
    <button onclick="exportarExcel()">📊 Exportar Excel</button>
  </nav>

  <!-- Área dinâmica de conteúdo -->
  <div id="conteudo"></div>

  <!-- Scripts dos módulos -->
  <script src="js/balanco.js"></script>
  <script src="js/pac.js"></script>
  <script src="js/cal.js"></script>
  <script src="js/polimero.js"></script>
  <script src="js/sedimentacao.js"></script>
  <script src="js/jar.js"></script>
  <script src="js/export.js"></script>
  <script src="js/storage.js"></script>

  <script>
    // Função para abrir cada módulo
    function abrir(modulo) {
      document.getElementById("conteudo").innerHTML = window[modulo+"View"]();
    }

    // Registrar Service Worker para funcionamento offline
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js")
        .then(() => console.log("Service Worker registrado!"));
    }
  </script>
</body>
</html>
